<html>
    <head>
        <title>HTML FORMS</title>
        <link rel="icon" href="">
        </head>
        <body>
<h1>User Registration form</h1>
<hr>
<br>
<form>
<label for="Name">Enter Your Name:</label>
    <input type="text">
    <br>
    <br>
<label for="email">Enter Your Email:</label>
<input type="email" placeholder="abs123@gamil.com">
<br>
<br>
<label for="Numbers">Enter Your Contact:</label>
<input type="number">
<br>
<br>
<label for="age">Enter Your Age:</label>
<input type="number" min="13" max="100" required>
<br><br>
<label for="gender">Select Your Gender:</label>
<input type="radio" name="gender">MALE
    <input type="radio" name="gender">FEMALE
    <input type="radio" name="gender">OTHERS
    <br><br>
    <label for="Qualification">Select Your Qualification:</label>
    <input type="checkbox">10th
    <input type="checkbox">12th
    <input type="checkbox">Graduation
    <input type="checkbox">Post-Graduation
    <br><br>
    <label for="city">Select Your City:</label>
<select name="city">
    <option value="delhi">Delhi</option>
    <option value="UP">Uttar Pradesh</option>
    <option value="UK">Uttarakhand</option>
    <option value="MP">Madhya Pradesh</option>
    <option value="TM">Tamil Nadu</option>
    <option value="Goa">Goa</option>
    <option value="Assam">Assam</option>
</select>
<br><br>
<Label for="D.O.B.">Date Of Birth:</Label>
<input type="date" min="2000-01-01">
<br>
<br>
<label for="Description">Description</label><br>
<textarea rows="5" cols="50" placeholder="Write about yourself"></textarea>
<br>
<br>
<label for="User-name">Enter Username:</label>
<input type="text">
<br>
<br>
<label for="password">Enter Your Passward</label>
<input type="password">
<br><br>
<input type="submit" value="Click here to Submit">
<br>
<br>
<button type="button" onclick="Alert('Hello Registration successfu')">Click Me!</button>

</form>
            </body>
    </html>
