<option value="Post-graduate">Post-graduate</option>
<option value="Government services">Government services</option>
<option value="Private sector">Private sector</option>
<option value="none">Prefer not to say</option>
     <select>
       <br><br>
<label id="recommend">Would you recommend Nokia to your friends?</lavel><br>
<input type="radio">Definitely<br>
<input type="radio">Sure<br>
<input type="radio">Maybe<br>
<br>
<lavel id="solution">What would you like to see improved?</label>
<br>
<input type="checkbox">Creative Design<br>

</div>
